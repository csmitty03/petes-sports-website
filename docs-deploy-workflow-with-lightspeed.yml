name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # Refresh inventory from Lightspeed every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync Lightspeed inventory
        env:
          LIGHTSPEED_DOMAIN_PREFIX: ${{ secrets.LIGHTSPEED_DOMAIN_PREFIX }}
          LIGHTSPEED_TOKEN: ${{ secrets.LIGHTSPEED_TOKEN }}
          LIGHTSPEED_API_VERSION: ${{ vars.LIGHTSPEED_API_VERSION }}
          # If secrets are not set yet, keep existing catalog and still deploy
          LIGHTSPEED_SYNC_OPTIONAL: '1'
        run: npm run sync:lightspeed

      - name: Generate static site
        run: npm run generate
        env:
          NUXT_APP_BASE_URL: /petes-sports-website/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
